<style>
/* ==========================================
   SCHOOL WALL CHART DESIGNER PRO
   style.css
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{

    --primary:#1565C0;
    --primary-dark:#0D47A1;

    --secondary:#00ACC1;

    --success:#2E7D32;

    --warning:#F9A825;

    --danger:#C62828;

    --light:#F5F7FA;

    --panel:#FFFFFF;

    --border:#D9E2EC;

    --text:#263238;

    --shadow:0 4px 18px rgba(0,0,0,.08);

    --radius:10px;

    --transition:.25s;

}

html,
body{

    width:100%;
    height:100%;

    overflow:hidden;

    font-family:"Poppins",sans-serif;

    background:#EEF3F8;

    color:var(--text);

}

/*==============================
GLOBAL BUTTON
==============================*/

button{

    border:none;

    cursor:pointer;

    transition:.25s;

    border-radius:8px;

    font-family:"Poppins",sans-serif;

}

/*==============================
FORM ELEMENTS
==============================*/

label{

    display:block;

    margin-top:14px;

    margin-bottom:6px;

    font-size:14px;

    font-weight:600;

}

input,
select,
textarea{

    width:100%;

    padding:10px;

    border:1px solid var(--border);

    border-radius:8px;

    outline:none;

    font-family:"Poppins",sans-serif;

    transition:.25s;

}

input:focus,
select:focus,
textarea:focus{

    border-color:var(--primary);

}

/*==============================
RANGE
==============================*/

input[type=range]{

    cursor:pointer;

}

/*==============================
COLOR PICKER
==============================*/

input[type=color]{

    padding:3px;

    height:42px;

    cursor:pointer;

}

/*==============================
HEADINGS
==============================*/

h2{

    color:var(--primary);

    margin-bottom:18px;

}

h3{

    color:var(--primary);

    margin-bottom:10px;

}

/*==============================
LINE
==============================*/

hr{

    border:none;

    height:1px;

    background:#E4E7EB;

    margin:18px 0;

}

/*==============================
LAYER LIST
==============================*/

#layersList{

    list-style:none;

    margin-top:12px;

}

#layersList li{

    padding:10px;

    background:white;

    border:1px solid var(--border);

    border-radius:8px;

    margin-bottom:8px;

    cursor:pointer;

    transition:.25s;

}

#layersList li:hover{

    background:#E3F2FD;

}

/*==============================
SCROLLBAR
==============================*/

::-webkit-scrollbar{

    width:10px;

}

::-webkit-scrollbar-thumb{

    background:#B0BEC5;

    border-radius:30px;

}

::-webkit-scrollbar-track{

    background:#ECEFF1;

}

/*==============================
UTILITY
==============================*/

.hidden{

    display:none;

}

.shadow{

    box-shadow:var(--shadow);

}

.round{

    border-radius:var(--radius);

}

.text-center{

    text-align:center;

}

.full-width{

    width:100%;

}

/*=========================================
    SCHOOL WALL CHART DESIGNER PRO
    layout.css
==========================================*/

/*==============================
TOP BAR
==============================*/

.topbar{

    height:70px;

    background:#ffffff;

    border-bottom:1px solid #D9E2EC;

    display:flex;

    align-items:center;

    justify-content:space-between;

    padding:0 20px;

    box-shadow:0 3px 12px rgba(0,0,0,.08);

    z-index:1000;

}

.brand{

    font-size:22px;

    font-weight:700;

    color:#1565C0;

    white-space:nowrap;

}

/*==============================
TOP TOOLBAR
==============================*/

.toolbar{

    display:flex;

    align-items:center;

    gap:8px;

}

.toolbar button{

    background:#1565C0;

    color:#fff;

    padding:9px 16px;

    font-size:14px;

}

.toolbar button:hover{

    background:#0D47A1;

}

/*==============================
RIGHT TOOLBAR
==============================*/

.toolbar-right{

    display:flex;

    align-items:center;

    gap:12px;

    min-width:320px;

}

.toolbar-right select{

    width:90px;

}

.toolbar-right input[type=range]{

    width:120px;

}

#zoomValue{

    min-width:55px;

    text-align:center;

    font-weight:600;

    color:#1565C0;

}

/*==============================
MAIN APP
==============================*/

.app{

    display:flex;

    height:calc(100vh - 70px);

    overflow:hidden;

}

/*==============================
TOOL PANEL
==============================*/

.tool-panel{

    width:320px;

    min-width:320px;

    background:#fff;

    border-right:1px solid #D9E2EC;

    padding:20px;

    overflow:auto;

}

/*==============================
WORKSPACE
==============================*/

.workspace{

    flex:1;

    background:#DDE5EE;

    display:flex;

    justify-content:center;

    align-items:center;

    overflow:auto;

    position:relative;

}

/*==============================
CANVAS
==============================*/

#canvasWrapper{

    background:#fff;

    padding:25px;

    margin:40px;

    border-radius:8px;

    box-shadow:0 10px 35px rgba(0,0,0,.18);

}

#designerCanvas{

    display:block;

    background:#fff;

    border:1px solid #D9D9D9;

}

/*==============================
RIGHT PROPERTIES PANEL
==============================*/

.properties{

    width:320px;

    min-width:320px;

    background:#fff;

    border-left:1px solid #D9E2EC;

    padding:20px;

    overflow:auto;

}

.properties input,

.properties select{

    margin-bottom:12px;

}

/*==============================
ALIGN BUTTONS
==============================*/

.alignButtons{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:8px;

}

.alignButtons button{

    background:#1565C0;

    color:white;

    padding:10px;

}

.alignButtons button:hover{

    background:#0D47A1;

}

/*==============================
ACTION BUTTONS
==============================*/

.properties button{

    width:100%;

    margin-top:10px;

    padding:11px;

}

#deleteObject{

    background:#C62828;

    color:#fff;

}

#deleteObject:hover{

    background:#B71C1C;

}

/*==============================
LAYERS
==============================*/

#layersList{

    min-height:120px;

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:1200px){

.tool-panel{

    width:280px;

    min-width:280px;

}

.properties{

    width:280px;

    min-width:280px;

}

}

@media(max-width:900px){

.app{

    flex-direction:column;

}

.tool-panel{

    display:none;

}

.properties{

    display:none;

}

.workspace{

    width:100%;

}

.toolbar{

    overflow:auto;

}

}

/*=========================================
    SCHOOL WALL CHART DESIGNER PRO
    sidebar.css
==========================================*/

/*==============================
LEFT SIDEBAR
==============================*/

.sidebar{

    width:90px;

    min-width:90px;

    background:#0F172A;

    display:flex;

    flex-direction:column;

    align-items:center;

    padding:18px 8px;

    gap:10px;

    overflow-y:auto;

    border-right:1px solid #1E293B;

}

.sidebar::-webkit-scrollbar{

    width:6px;

}

.sidebar::-webkit-scrollbar-thumb{

    background:#475569;

    border-radius:20px;

}

/*==============================
SIDEBAR BUTTONS
==============================*/

.sidebar button{

    width:70px;

    height:70px;

    border:none;

    background:transparent;

    color:#CBD5E1;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    border-radius:12px;

    cursor:pointer;

    transition:all .25s ease;

    font-size:22px;

    flex-shrink:0;

}

.sidebar button span{

    margin-top:5px;

    font-size:10px;

    font-weight:600;

    text-align:center;

    line-height:1.2;

}

.sidebar button:hover{

    background:#2563EB;

    color:#fff;

    transform:scale(1.05);

}

.sidebar button.active{

    background:#1565C0;

    color:#fff;

    transform:scale(1.05);

    box-shadow:0 8px 20px rgba(21,101,192,.35);

}

.sidebar button:active{

    transform:scale(.96);

}

/*==============================
TOOL PANEL CONTENT
==============================*/

#toolContent{

    min-height:450px;

}

/*==============================
TOOL CARD
==============================*/

.tool-card{

    background:#F8FAFC;

    border:1px solid #E2E8F0;

    border-radius:12px;

    padding:16px;

    margin-bottom:18px;

    animation:fade .25s ease;

}

.tool-card h3{

    margin-bottom:15px;

    color:#1565C0;

    font-size:18px;

}

.tool-card p{

    font-size:14px;

    color:#64748B;

    line-height:1.6;

}

.tool-card small{

    color:#94A3B8;

}

/*==============================
CARD BUTTONS
==============================*/

.tool-card button{

    width:100%;

    padding:12px;

    margin-bottom:10px;

    background:#1565C0;

    color:#fff;

    border:none;

    border-radius:8px;

    font-weight:600;

    transition:.25s;

}

.tool-card button:hover{

    background:#0D47A1;

}

.tool-card button:last-child{

    margin-bottom:0;

}

/*==============================
CARD INPUTS
==============================*/

.tool-card input,

.tool-card select{

    width:100%;

    margin-bottom:12px;

    padding:10px;

    border:1px solid #CBD5E1;

    border-radius:8px;

    font-family:"Poppins",sans-serif;

}

/*==============================
IMAGE PREVIEW
==============================*/

.image-thumb{

    width:100%;

    border-radius:10px;

    display:block;

    margin-bottom:12px;

}

/*==============================
SHAPE GRID
==============================*/

.shape-grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:10px;

}

.shape-item{

    height:80px;

    border:1px solid #CBD5E1;

    border-radius:10px;

    background:#fff;

    display:flex;

    justify-content:center;

    align-items:center;

    cursor:pointer;

    transition:.25s;

    font-size:30px;

}

.shape-item:hover{

    background:#E3F2FD;

    border-color:#1565C0;

    transform:scale(1.04);

}

/*==============================
TEMPLATE GRID
==============================*/

.template-grid{

    display:grid;

    grid-template-columns:1fr;

    gap:15px;

}

.template{

    min-height:170px;

    background:#fff;

    border:1px solid #CBD5E1;

    border-radius:12px;

    overflow:hidden;

    cursor:pointer;

    transition:.25s;

}

.template:hover{

    transform:translateY(-4px);

    box-shadow:0 10px 25px rgba(0,0,0,.12);

}

.template img{

    width:100%;

    height:130px;

    object-fit:cover;

    display:block;

}

.template h4{

    padding:10px;

    font-size:15px;

    font-weight:600;

    color:#334155;

}

/*==============================
FADE ANIMATION
==============================*/

.fadeIn{

    animation:fade .25s ease;

}

@keyframes fade{

    from{

        opacity:0;

        transform:translateY(10px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:1200px){

    .sidebar{

        width:80px;

        min-width:80px;

    }

    .sidebar button{

        width:62px;

        height:62px;

        font-size:20px;

    }

}

@media(max-width:900px){

    .sidebar{

        width:70px;

        min-width:70px;

    }

    .sidebar button{

        width:54px;

        height:54px;

        font-size:18px;

    }

    .sidebar button span{

        display:none;

    }

}

/*=========================================
    SCHOOL WALL CHART DESIGNER PRO
    properties.css
==========================================*/

/*==============================
PROPERTIES PANEL
==============================*/

.properties{

    width:320px;

    min-width:320px;

    background:#FFFFFF;

    border-left:1px solid #D9E2EC;

    display:flex;

    flex-direction:column;

    overflow-y:auto;

    padding:20px;

}

/*==============================
SCROLLBAR
==============================*/

.properties::-webkit-scrollbar{

    width:8px;

}

.properties::-webkit-scrollbar-thumb{

    background:#CBD5E1;

    border-radius:20px;

}

/*==============================
TITLE
==============================*/

.properties h2{

    color:#1565C0;

    font-size:24px;

    margin-bottom:20px;

}

.properties h3{

    color:#1565C0;

    font-size:18px;

    margin:18px 0 10px;

}

/*==============================
LABELS
==============================*/

.properties label{

    display:block;

    margin-top:12px;

    margin-bottom:6px;

    font-size:13px;

    font-weight:600;

    color:#475569;

}

/*==============================
INPUTS
==============================*/

.properties input,

.properties select,

.properties textarea{

    padding:10px;

    border-radius:8px;

    background:white;

    font-family:"Poppins",sans-serif;

    font-size:14px;

    margin-bottom:12px;

    transition:.25s;

}

.properties input:focus,

.properties select:focus,

.properties textarea:focus{

    outline:none;

    border-color:#1565C0;

    box-shadow:0 0 0 3px rgba(21,101,192,.15);

}

/*==============================
COLOR PICKER
==============================*/

.properties input[type=color]{

    padding:3px;

    height:45px;

    cursor:pointer;

}

/*==============================
RANGE
==============================*/

.properties input[type=range]{

    padding:0;

    cursor:pointer;

}

/*==============================
ALIGNMENT
==============================*/

.alignButtons{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:8px;

    margin-top:10px;

}

.alignButtons button{

    height:42px;

    background:#1565C0;

    color:white;

    border:none;

    border-radius:8px;

    cursor:pointer;

    transition:.25s;

    font-size:18px;

}

.alignButtons button:hover{

    background:#0D47A1;

}

/*==============================
ACTION BUTTONS
==============================*/

.properties button{

    width:100%;

    padding:11px;

    margin-top:10px;

    border:none;

    border-radius:8px;

    background:#1565C0;

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:.25s;

}

.properties button:hover{

    background:#0D47A1;

}

/*==============================
DELETE BUTTON
==============================*/

#deleteObject{

    background:#D32F2F;

}

#deleteObject:hover{

    background:#B71C1C;

}

/*==============================
DIVIDER
==============================*/

.properties hr{

    border:none;

    height:1px;

    background:#E2E8F0;

    margin:20px 0;

}

/*==============================
LAYERS
==============================*/

#layersList{

    list-style:none;

    margin-top:10px;

    padding:0;

}

#layersList li{

    padding:10px;

    border:1px solid #CBD5E1;

    border-radius:8px;

    background:#F8FAFC;

    margin-bottom:8px;

    cursor:pointer;

    transition:.25s;

    font-size:14px;

}

#layersList li:hover{

    background:#E3F2FD;

    border-color:#1565C0;

}

/*==============================
SECTION CARD
==============================*/

.property-card{

    background:#F8FAFC;

    border:1px solid #E2E8F0;

    border-radius:10px;

    padding:15px;

    margin-bottom:18px;

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:1200px){

    .properties{

        width:280px;

        min-width:280px;

    }

}

@media(max-width:900px){

    .properties{

        display:none;

    }

}
/*=========================================
    SCHOOL WALL CHART DESIGNER PRO
    canvas.css
==========================================*/

/*==============================
WORKSPACE
==============================*/

.workspace{

    position:relative;

    display:flex;

    justify-content:center;

    align-items:flex-start;

    overflow:auto;

    background:#DFE7EF;

    background-image:
        linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);

    background-size:25px 25px;

}

/*==============================
CANVAS WRAPPER
==============================*/

#canvasWrapper{

    position:relative;

    margin:60px;

    padding:25px;

    background:#FFFFFF;

    border-radius:8px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.15),
        0 0 0 1px rgba(0,0,0,.08);

    transform-origin:center center;

    transition:transform .25s ease;

}

/*==============================
FABRIC CANVAS
==============================*/

#designerCanvas{

    display:block;

    background:#FFFFFF;

    border:1px solid #D6D6D6;

}

/*==============================
SAFE MARGIN
==============================*/

.canvas-safe-area{

    position:absolute;

    inset:20px;

    border:2px dashed rgba(33,150,243,.25);

    pointer-events:none;

}

/*==============================
PRINT MARGIN
==============================*/

.canvas-print-area{

    position:absolute;

    inset:8px;

    border:1px dashed rgba(255,0,0,.25);

    pointer-events:none;

}

/*==============================
PAGE LABEL
==============================*/

.paper-label{

    position:absolute;

    top:-42px;

    left:0;

    padding:6px 14px;

    background:#1565C0;

    color:#FFFFFF;

    border-radius:6px;

    font-size:13px;

    font-weight:600;

}

/*==============================
GRID
==============================*/

.hide-grid{

    background-image:none !important;

}

/*==============================
DISPLAY PAPER SIZES
==============================*/

.paper-a4{

    width:794px;

    height:1123px;

}

.paper-a3{

    width:1123px;

    height:1587px;

}

.paper-a2{

    width:1587px;

    height:2245px;

}

.paper-a1{

    width:2245px;

    height:3179px;

}

.paper-a0{

    width:3179px;

    height:4494px;

}

/*==============================
LANDSCAPE
==============================*/

.landscape{

    transform:none;

}

/*==============================
SELECTION
==============================*/

.canvas-object-selected{

    outline:2px dashed #1565C0;

}

/*==============================
ALIGNMENT GUIDES
==============================*/

.guide-horizontal{

    position:absolute;

    left:0;

    width:100%;

    height:1px;

    background:#FF1744;

    pointer-events:none;

    display:none;

}

.guide-vertical{

    position:absolute;

    top:0;

    width:1px;

    height:100%;

    background:#FF1744;

    pointer-events:none;

    display:none;

}

/*==============================
CENTER POINT
==============================*/

.center-point{

    position:absolute;

    left:50%;

    top:50%;

    width:10px;

    height:10px;

    background:#1565C0;

    border-radius:50%;

    transform:translate(-50%,-50%);

    pointer-events:none;

    display:none;

}

/*==============================
LOADING
==============================*/

.canvas-loading{

    position:absolute;

    inset:0;

    display:none;

    justify-content:center;

    align-items:center;

    background:rgba(255,255,255,.85);

    font-size:22px;

    font-weight:700;

    color:#1565C0;

}

/*==============================
ZOOM
==============================*/

.zooming{

    transition:transform .2s ease;

}

/*==============================
RESPONSIVE
==============================*/

@media(max-width:900px){

    #canvasWrapper{

        margin:20px;

        padding:15px;

    }

}

</style>

<section class="tool-panel">

<h2>

Tool Box

</h2>

<div id="toolContent">

Select a tool from the left.

</div>

</section>

<!-- CANVAS -->

<section class="workspace">

<div id="canvasWrapper">

<canvas id="designerCanvas">

</canvas>

</div>

</section>

<!-- RIGHT PANEL -->

<aside class="properties">

<h2>

Properties

</h2>

<label>

Text

</label>

<input
id="objectText">

<label>

Font

</label>

<select
id="fontFamily">

<option>Poppins</option>

<option>Arial</option>

<option>Verdana</option>

<option>Georgia</option>

</select>

<label>

Size

</label>

<input
type="number"
id="fontSize"
value="36">

<label>

Color

</label>

<input
type="color"
id="textColor">

<label>

Background

</label>

<input
type="color"
id="backgroundColor">

<label>

Opacity

</label>

<input
type="range"
id="opacity"
min="0"
max="100"
value="100">

<hr>

<h3>

Alignment

</h3>

<div class="alignButtons">

<button id="leftBtn">

⬅

</button>

<button id="centerBtn">

⬌

</button>

<button id="rightBtn">

➡

</button>

<button id="topBtn">

⬆

</button>

<button id="middleBtn">

⬍

</button>

<button id="bottomBtn">

⬇

</button>

</div>

<hr>

<h3>

Layer

</h3>

<button id="frontBtn">

Bring Front

</button>

<button id="backBtn">

Send Back

</button>

<button id="deleteObject">

Delete

</button>

<hr>

<h3>

Objects

</h3>

<ul id="layersList">

</ul>

</aside>

</div>

<script src="js/utils.js"></script>
<script src="js/history.js"></script>
<script src="js/templates.js"></script>
<script src="js/canvas.js"></script>
<script src="js/editor.js"></script>
<script src="js/export.js"></script>
<script src="js/toolbar.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>

</body>

</html>
