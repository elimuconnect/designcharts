<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>School Wall Chart Designer Pro</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/sidebar.css">
<link rel="stylesheet" href="css/canvas.css">
<link rel="stylesheet" href="css/properties.css">


<!-- Core Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Application Engine Scripts (Order Matters!) -->
<script src="js/charts.js"></script>


<style>
#layersPanel{

width:250px;

background:white;

border-left:1px solid #ddd;

padding:10px;

}



.layer-item{

display:flex;

justify-content:space-between;

padding:10px;

margin-bottom:5px;

background:#f2f6ff;

cursor:pointer;

border-radius:8px;

}


.layer-item:hover{

background:#dbeafe;

}
</style>
</head>
  
<body>

<!-- ===========================
TOP BAR
=========================== -->

<header class="topbar">

  <div class="brand">
    🎓 School Wall Chart Designer
  </div>


  <div class="toolbar">

    <button id="newBtn">New</button>
    <button id="saveBtn">Save</button>
    <button id="loadBtn">Open</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
    <button id="copyBtn">Copy</button>
    <button id="pasteBtn">Paste</button>
    <button id="duplicateBtn">Duplicate</button>
    <button id="exportPNG">PNG</button>
    <button id="exportPDF">PDF</button>

  </div>


  <div class="toolbar-right">

    <select id="paperSize">
      <option>A4</option>
      <option>A3</option>
      <option>A2</option>
      <option>A1</option>
      <option>A0</option>
    </select>


    <select id="orientation">

      <option value="portrait">
        Portrait
      </option>

      <option value="landscape">
        Landscape
      </option>

    </select>


    <input 
      type="range" 
      id="zoomSlider" 
      min="20" 
      max="300" 
      value="100"
    >

    <span id="zoomValue">
      100%
    </span>


  </div>

</header>



<!-- ===========================
MAIN APP LAYOUT
=========================== -->

<div class="app-container">



<!-- ===========================
LEFT AREA
=========================== -->

<div class="left-container">


<button 
id="toggleLeftSidebar" 
class="collapse-btn"
title="Toggle Sidebar">

◀ Sidebar

</button>



<!-- ICON SIDEBAR -->

<nav class="sidebar">


<button id="toolTemplates">
⭐ <span>Templates</span>
</button>


<button id="toolText">
📝 <span>Text</span>
</button>


<button id="toolImages">
🖼️ <span>Images</span>
</button>


<button id="toolShapes">
⬜ <span>Shapes</span>
</button>


<button id="toolTables">
📊 <span>Tables</span>
</button>


<button id="toolIcons">
😀 <span>Icons</span>
</button>


<button id="toolCharts">
📈 <span>Charts</span>
</button>


<button id="toolBackground">
🎨 <span>Background</span>
</button>


<button id="toolUploads">
⬆️ <span>Uploads</span>
</button>


<button id="toolLogos">
🏫 <span>School Logo</span>
</button>


</nav>

<!-- TOOL PANEL -->

<section class="tool-panel">


<h2>
Tool Box
</h2>


<div id="toolContent">

Select a tool from the left.

</div>

</section>

</div>

<!-- ===========================
CANVAS WORKSPACE
=========================== -->


<section class="workspace">


<div id="canvasWrapper">


<canvas id="designerCanvas"></canvas>


</div>


</section>

<!-- ===========================
RIGHT PROPERTIES PANEL
=========================== -->


<aside class="properties">



<button 
id="toggleRightSidebar"
class="collapse-btn"
title="Toggle Properties">

Properties ▶

</button>

<h2>
Properties
</h2>

<label>
Text
</label>

<input id="objectText">

<label>
Font
</label>


<select id="fontFamily">

<option>
Poppins
</option>

<option>
Arial
</option>

<option>
Verdana
</option>

<option>
Georgia
</option>

</select>

<label>
Size
</label>

<input 
type="number" 
id="fontSize" 
value="36"
>

<label>
Color
</label>


<input 
type="color" 
id="textColor"
>

<label>
Background
</label>


<input 
type="color" 
id="backgroundColor"
>

<label>
Opacity
</label>


<input 
type="range" 
id="opacity" 
min="0" 
max="100" 
value="100"
>

<hr>

<h3>
Alignment
</h3>


<div class="alignButtons">


<button id="leftBtn">
⬅
</button>


<button id="centerBtn">
⬌
</button>


<button id="rightBtn">
➡
</button>


<button id="topBtn">
⬆
</button>


<button id="middleBtn">
⬍
</button>


<button id="bottomBtn">
⬇
</button>


</div>






<hr>





<h3>
Layer
</h3>


<button id="frontBtn">
Bring Front
</button>


<button id="backBtn">
Send Back
</button>


<button id="deleteObject">
Delete
</button>






<hr>





<h3>
Objects
</h3>


<ul id="layersList"></ul>



<!-- NEW LAYERS PANEL LOCATION -->

<h3>
Layers
</h3>

<div id="layersPanel"></div>



</aside>



</div>

<script src="js/utils.js"></script>
<script src="js/history.js"></script>
<script src="js/templates.js"></script>
<script src="js/canvas.js"></script>
<script src="js/editor.js"></script>
<script src="js/export.js"></script>
<script src="js/toolbar.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>

</body>
</html>
